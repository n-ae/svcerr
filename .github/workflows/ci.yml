name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...
      - name: Check formatting
        run: |
          fmt="$(gofmt -l .)"
          if [ -n "$fmt" ]; then
            echo "The following files are not gofmt'd:"
            echo "$fmt"
            exit 1
          fi
