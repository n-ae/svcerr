name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel a run's older in-progress attempt when a new commit lands on the
# same branch/PR, so superseded runs stop burning billable minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          # Single source of truth for the Go version - stays in sync with
          # go.mod automatically, no separate version to bump here.
          go-version-file: go.mod
          # Caches the module and build cache keyed on go.sum (default on,
          # kept explicit since it's the main lever on run duration here).
          cache: true
      # Fails fast on the cheapest check before spending time on vet/test.
      - name: Check formatting
        run: |
          fmt="$(gofmt -l .)"
          if [ -n "$fmt" ]; then
            echo "The following files are not gofmt'd:"
            echo "$fmt"
            exit 1
          fi
      # golangci-lint's default linter set includes govet, so this also
      # covers what a standalone `go vet ./...` step would (plus errcheck,
      # staticcheck, unused, ineffassign).
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
      - run: go test ./...
