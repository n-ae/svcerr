name: govulncheck

# Scheduled rather than per-push: vulnerability advisories change on
# their own clock, not this repository's, and the root module is
# dependency-free - a per-push scan would re-check an unchanged answer.
# The weekly run catches new advisories against the stdlib and the
# adapter's zerolog dependency chain; workflow_dispatch allows an
# on-demand run (e.g. as part of a release checklist or an assessment's
# verification pass).
on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC - off the top of the hour to dodge scheduler congestion
  workflow_dispatch:

# Read-only by default already (repository setting), but that default is
# mutable repo/org state, not something this file controls - declaring it
# here means a copied repository, a changed org default, or this workflow
# restored in another context can't silently inherit broader permissions
# (assessment head-2026-07-18 L5, Codex).
permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      # Same two-module split as ci.yml: zerologadapter is a separate
      # nested module, invisible to the root's `./...`.
      matrix:
        module: [., zerologadapter]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          # Stable only: govulncheck needs a recent toolchain, and the
          # advisory database is versioned against symbols, not the
          # module's floor - the floor lanes in ci.yml prove buildability,
          # not vuln posture.
          go-version: stable
          cache: true
      - name: Run govulncheck
        # Pinned rather than @latest: the advisory database already
        # varies run to run by design (that's the point of the
        # schedule), and floating the scanner binary too would add a
        # second, independent source of change - the same commit and
        # database state could then scan differently after a new scanner
        # release, with no way to tell which one moved. Bump deliberately,
        # as part of dependency maintenance (assessment head-2026-07-18
        # L5, Codex).
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          govulncheck ./...
