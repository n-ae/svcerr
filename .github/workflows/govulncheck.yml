name: govulncheck

# Scheduled rather than per-push: vulnerability advisories change on
# their own clock, not this repository's, and the root module is
# dependency-free - a per-push scan would re-check an unchanged answer.
# The weekly run catches new advisories against the stdlib and the
# adapter's zerolog dependency chain; workflow_dispatch allows an
# on-demand run (e.g. as part of a release checklist or an assessment's
# verification pass).
on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC - off the top of the hour to dodge scheduler congestion
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      # Same two-module split as ci.yml: zerologadapter is a separate
      # nested module, invisible to the root's `./...`.
      matrix:
        module: [., zerologadapter]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          # Stable only: govulncheck needs a recent toolchain, and the
          # advisory database is versioned against symbols, not the
          # module's floor - the floor lanes in ci.yml prove buildability,
          # not vuln posture.
          go-version: stable
          cache: true
      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
